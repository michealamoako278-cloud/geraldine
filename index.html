<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Geraldine</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow: hidden;
    padding:20px;
    position:relative;
}

.song{
    position: absolute;
    opacity: .3;
    bottom: 10px;
    left: 10px;
}

/* Birthday Heading */
h1{
    color:white;
    font-size:clamp(1.5rem, 6vw, 3rem);
    text-shadow:2px 2px 10px rgba(0,0,0,0.3);
    margin-bottom:10px;
}

/* Name Animation */
#name{
    color:gold;
    font-weight:bold;
    font-size:clamp(2rem, 8vw, 4rem);
    letter-spacing:4px;
    min-height:50px;
    text-shadow:2px 2px 10px rgba(0,0,0,0.4);
    margin-bottom:10px;
}

#her-name{
  font-family: cursive;
  color: purple;
  font-size: 25px;
}

/* Image Container */
.image-container{
    width:min(90vw, 350px);
    height:min(120vw, 450px);
    border-radius:20px;
    overflow:hidden;
    border:5px solid white;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    background:white;
    position: relative;
}

.image-container img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Message */
.message{
    margin-top:20px;
    color:white;
    font-size:clamp(1rem,4vw,1.4rem);
    font-weight:bold;
    max-width:600px;
    line-height:1.5;
    padding:0 10px;
}

/* Balloons */
.balloon{
    position:absolute;
    bottom:-100px;
    width:50px;
    height:65px;
    border-radius:50%;
    opacity:0.8;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

/* Floating Hearts */
.heart{
    position:absolute;
    color:white;
    font-size:24px;
    animation:rise 8s linear infinite;
}

@keyframes rise{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}


</style>
</head>

<body>

<h1>🎂 HAPPY BIRTHDAY 🎂</h1>

<div id="name"></div>

<div class="image-container">
    <img id="birthdayImage" src="img2.jpg" alt="Geraldine">
    <audio class="song" controls autoplay loop>
    <source src="song.mp3" type="" media="" />
</audio>
</div>

<div class="message">
    🌹 To my favourite student, <span id="her-name">Geraldine</span> 🌹<br> May your special day be filled with happiness, laughter,
    success, and countless blessings. May all your dreams come true.
    Enjoy every moment of your birthday! 🎉🎁❤️
</div>

<script>

/* NAME TYPING EFFECT */
const studentName = "GERALDINE";
const nameElement = document.getElementById("name");

function animateName() {
  
let i = 0;
let current = "";

function typeName(){
    if(i < studentName.length){
      
      current += studentName[i];
        nameElement.innerHTML = current;
        i++;
        setTimeout(typeName, 350);
    } else{
      setTimeout(deleteLetters, 1300)
    }
}

function deleteLetters(){
  
  if(current.length > 0){
    current = current.slice(0, -1);
    nameElement.textContent = current;
    
    setTimeout(deleteLetters, 350)
  } else{
    setTimeout(animateName, 500)
  }
}

typeName();

}

animateName();

/* IMAGE SLIDESHOW */
const images = [
    "img1.jpg",
    "img2.jpg",
    "img3.jpg",
    "img4.jpg",
    "img5.jpg",
    "img6.jpg",
    "img7.jpg"
];

let currentImage = 0;

setInterval(() => {
    currentImage = (currentImage + 1) % images.length;
    document.getElementById("birthdayImage").src = images[currentImage];
}, 3000);

/* BALLOONS */
const colors = [
    "#ff4d6d",
    "#ffbe0b",
    "#8338ec",
    "#3a86ff",
    "#06d6a0",
    "#fb5607"
];

for(let i=0; i<15; i++){
    let balloon = document.createElement("div");

    balloon.classList.add("balloon");

    balloon.style.left = Math.random()*100 + "vw";

    balloon.style.backgroundColor =
        colors[Math.floor(Math.random()*colors.length)];

    balloon.style.animationDuration =
        (6 + Math.random()*6) + "s";

    balloon.style.animationDelay =
        Math.random()*5 + "s";

    document.body.appendChild(balloon);
}

/* FLOATING HEARTS */
setInterval(() => {

    let heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);

},1000);

</script>

</body>
</html>
